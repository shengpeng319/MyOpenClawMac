<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐭 小老鼠奶酪屋 - 减法乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --cheese: #FFD93D;
            --cheese-dark: #F4C430;
            --success: #6BCB77;
            --success-dark: #5AB468;
            --error: #FF6B6B;
            --forest: #2D5A27;
            --forest-light: #4A7C43;
            --cream: #FFF8E7;
            --wood: #8B4513;
            --wood-light: #A0522D;
        }
        
        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8AA 50%, #4A7C43 100%);
            overflow-x: hidden;
        }
        
        /* 森林背景 */
        .forest-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }
        
        .tree {
            position: absolute;
            font-size: 60px;
            bottom: 20%;
        }
        
        .cloud {
            position: absolute;
            font-size: 40px;
            animation: cloud-float 20s linear infinite;
            opacity: 0.8;
        }
        
        @keyframes cloud-float {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 100px)); }
        }
        
        /* 奶酪屋顶 */
        .cheese-roof {
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            font-size: 80px;
            z-index: 1;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }
        
        /* 主容器 */
        .game-container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            min-height: 100vh;
        }
        
        /* 标题栏 */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .game-title {
            font-size: 2.5rem;
            color: var(--cheese);
            text-shadow: 3px 3px 0 var(--wood), 5px 5px 10px rgba(0,0,0,0.3);
            animation: title-bounce 2s ease-in-out infinite;
        }
        
        @keyframes title-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* 进度条 */
        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            height: 30px;
            margin: 15px auto;
            max-width: 400px;
            overflow: hidden;
            border: 3px solid var(--wood);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cheese) 0%, var(--success) 100%);
            border-radius: 20px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .progress-text {
            color: var(--wood);
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        /* 关卡信息 */
        .level-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .level-badge {
            background: var(--cream);
            padding: 10px 25px;
            border-radius: 25px;
            border: 3px solid var(--wood);
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--forest);
        }
        
        /* 角色选择区 */
        .character-area {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .character {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 30px;
            border: 4px solid var(--wood);
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 180px;
        }
        
        .character:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        
        .character.selected {
            border-color: var(--success);
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
            transform: scale(1.05);
        }
        
        .character.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .character-emoji {
            font-size: 4rem;
            margin-bottom: 10px;
            display: block;
            animation: character-idle 1s ease-in-out infinite;
        }
        
        @keyframes character-idle {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-5px) rotate(5deg); }
        }
        
        .character-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--forest);
        }
        
        .character-method {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        
        .character.unlocked .lock-overlay {
            display: none;
        }
        
        .character.locked .lock-overlay {
            display: flex;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        
        /* 题目区 */
        .problem-card {
            background: linear-gradient(135deg, var(--cream) 0%, #FFF 100%);
            border-radius: 40px;
            padding: 30px;
            margin: 25px auto;
            max-width: 500px;
            border: 5px solid var(--wood);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            position: relative;
        }
        
        .problem-equation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 3rem;
            font-weight: bold;
            color: var(--forest);
            flex-wrap: wrap;
        }
        
        .problem-num {
            background: linear-gradient(135deg, var(--cheese) 0%, var(--cheese-dark) 100%);
            padding: 15px 25px;
            border-radius: 20px;
            border: 4px solid var(--wood);
            min-width: 80px;
            text-align: center;
            animation: bounce-in 0.5s ease-out;
        }
        
        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .problem-op {
            font-size: 2.5rem;
            color: var(--error);
        }
        
        .problem-equals {
            font-size: 2.5rem;
            color: var(--forest);
        }
        
        .problem-answer {
            background: white;
            border: 4px dashed var(--success);
            border-radius: 20px;
            min-width: 80px;
            padding: 15px 25px;
            text-align: center;
            animation: pulse-border 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse-border {
            0%, 100% { border-color: var(--success); }
            50% { border-color: var(--cheese); }
        }
        
        .problem-answer.correct {
            background: var(--success);
            border: 4px solid var(--success-dark);
            color: white;
            animation: celebrate-answer 0.5s ease-out;
        }
        
        .problem-answer.wrong {
            background: var(--error);
            border: 4px solid #e55555;
            color: white;
            animation: shake-card 0.5s ease-out;
        }
        
        @keyframes celebrate-answer {
            0% { transform: scale(1); }
            50% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake-card {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-5deg); }
            75% { transform: translateX(15px) rotate(5deg); }
        }
        
        /* 方块可视化区 */
        .blocks-area {
            margin: 25px 0;
            padding: 20px;
            background: rgba(255,248,231,0.8);
            border-radius: 25px;
            min-height: 150px;
        }
        
        .blocks-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        /* P1-1 & P1-3: Larger blocks, numbers hidden by default */
        .block {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--cheese) 0%, var(--cheese-dark) 100%);
            border-radius: 12px;
            border: 3px solid var(--wood);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--wood);
            transition: all 0.3s ease;
            position: relative;
        }
        
        /* P1-3: Numbers hidden by default */
        .block .block-num {
            display: none;
            font-size: 1rem;
        }
        
        /* P1-3: Show numbers on hover */
        .block.show-num:hover .block-num {
            display: inline;
        }
        
        .block.borrowed {
            background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%);
            animation: block-borrow 0.5s ease;
        }
        
        @keyframes block-borrow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .block.used {
            background: linear-gradient(135deg, #D3D3D3 0%, #A9A9A9 100%);
            border-color: #888;
            color: #666;
        }
        
        .block.tens {
            background: linear-gradient(135deg, #87CEEB 0%, #4682B4 100%);
            border-color: #4682B4;
        }
        
        .blocks-label {
            text-align: center;
            font-size: 1.1rem;
            color: var(--forest);
            margin-top: 10px;
        }
        /* P0-1: Prominent hint bar */
        .hint-bar {
            background: linear-gradient(135deg, #FFF9C4 0%, #FFF59D 100%);
            border: 3px solid #FFC107;
            border-radius: 20px;
            padding: 15px 20px;
            margin: 15px auto;
            max-width: 500px;
            text-align: center;
            font-size: 1.15rem;
            font-weight: bold;
            color: #8B4513;
            animation: pulse-hint 2s ease-in-out infinite;
        }
        
        @keyframes pulse-hint {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,193,7,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(255,193,7,0); }
        }
        
        .hint-bar .hint-arrow {
            font-size: 1.4rem;
            margin-right: 8px;
        }
        
        .hint-bar .hint-text {
            color: #E65100;
        }

        
        /* 步骤展示 */
        .steps-area {
            margin: 20px 0;
        }
        
        .step {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: white;
            border-radius: 20px;
            margin: 10px 0;
            border-left: 6px solid var(--cheese);
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.4s ease;
        }
        
        .step.visible {
            opacity: 1;
            transform: translateX(0);
        }
        
        .step-icon {
            font-size: 2rem;
            margin-right: 15px;
        }
        
        .step-text {
            font-size: 1.2rem;
            color: var(--forest);
            flex: 1;
        }
        
        .step-highlight {
            color: var(--error);
            font-weight: bold;
        }
        
        .step-result {
            color: var(--success);
            font-weight: bold;
        }
        
        /* 输入区 */
        .input-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .answer-input {
            width: 150px;
            height: 70px;
            font-size: 2.5rem;
            text-align: center;
            border: 4px solid var(--wood);
            border-radius: 20px;
            outline: none;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .answer-input:focus {
            border-color: var(--success);
            box-shadow: 0 0 25px rgba(107, 203, 119, 0.4);
        }
        
        .btn {
            padding: 18px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            min-width: 60px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
            color: white;
            border: 4px solid var(--success-dark);
        }
        
        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(107, 203, 119, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--cheese) 0%, var(--cheese-dark) 100%);
            color: var(--wood);
            border: 4px solid var(--wood);
        }
        
        .btn-secondary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 217, 61, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 反馈区 */
        .feedback {
            text-align: center;
            padding: 25px;
            border-radius: 25px;
            margin: 20px auto;
            max-width: 450px;
            font-size: 1.5rem;
            font-weight: bold;
            display: none;
        }
        
        .feedback.show {
            display: block;
            animation: pop-in 0.4s ease-out;
        }
        
        .feedback.correct {
            background: linear-gradient(135deg, #C8E6C9 0%, #A5D6A7 100%);
            color: var(--success-dark);
        }
        
        .feedback.wrong {
            background: linear-gradient(135deg, #FFCDD2 0%, #EF9A9A 100%);
            color: var(--error);
        }
        
        @keyframes pop-in {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* 星星评价 */
        .stars-display {
            font-size: 3rem;
            margin: 15px 0;
        }
        
        /* 开始界面 */
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
            animation: fade-in 0.5s ease;
        }
        
        @keyframes fade-in {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* 关卡选择 */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            max-width: 500px;
            margin: 30px auto;
        }
        
        .level-btn {
            aspect-ratio: 1;
            border-radius: 20px;
            border: 4px solid var(--wood);
            background: var(--cream);
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .level-btn:hover:not(.locked) {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .level-btn.current {
            background: linear-gradient(135deg, var(--cheese) 0%, var(--cheese-dark) 100%);
            border-color: var(--cheese);
        }
        
        .level-btn.completed {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
            color: white;
        }
        
        .level-btn.locked {
            background: #D3D3D3;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .level-stars {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
        }
        
        /* 成就墙 */
        .achievements {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            max-width: 600px;
            margin: 20px auto;
        }
        
        .achievement {
            text-align: center;
            padding: 20px;
            background: var(--cream);
            border-radius: 20px;
            border: 3px solid var(--wood);
        }
        
        .achievement.unlocked {
            background: linear-gradient(135deg, var(--cheese) 0%, #FFE082 100%);
        }
        
        .achievement-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
        }
        
        .achievement-name {
            font-size: 0.9rem;
            color: var(--forest);
            font-weight: bold;
        }
        
        /* 收集品展示 */
        .collection {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .cheese-fragment {
            font-size: 2rem;
            padding: 5px 10px;
            background: var(--cream);
            border-radius: 10px;
            border: 2px solid var(--wood);
        }
        
        .cheese-fragment.collected {
            background: var(--cheese);
            animation: collect-bounce 0.5s ease;
        }
        
        @keyframes collect-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        /* 动物朋友 */
        .animal-friends {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .animal {
            font-size: 2.5rem;
            padding: 15px;
            background: var(--cream);
            border-radius: 50%;
            border: 3px solid var(--wood);
            opacity: 0.4;
            transition: all 0.3s ease;
        }
        
        .animal.unlocked {
            opacity: 1;
            animation: animal-unlock 0.6s ease;
        }
        
        @keyframes animal-unlock {
            0% { transform: scale(0) rotate(-180deg); }
        /* P1-4: Character method tooltip */
        .character-tooltip {
            display: none;
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--cream);
            border: 2px solid var(--wood);
            border-radius: 15px;
            padding: 8px 15px;
            font-size: 0.9rem;
            color: var(--forest);
            white-space: nowrap;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .character-tooltip::before {
            content: '💬';
            margin-right: 5px;
        }
        
        .character:hover .character-tooltip {
            display: block;
        }
        

            100% { transform: scale(1) rotate(0); }
        }
        
        /* 庆祝效果 */
        
        /* P1-2: Animal unlock notification popup */
        .animal-unlock-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #FFF9C4 0%, #FFE082 100%);
            border: 5px solid var(--wood);
            border-radius: 30px;
            padding: 30px 50px;
            text-align: center;
            z-index: 10000;
            animation: popup-unlock 0.6s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        @keyframes popup-unlock {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); }
            60% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0); }
        }
        
        .animal-unlock-popup .popup-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }
        
        .animal-unlock-popup .popup-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--forest);
        }
        
        .animal-unlock-popup .popup-desc {
            font-size: 1rem;
            color: #666;
            margin-top: 5px;
        }
        
.confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            top: -20px;
            border-radius: 2px;
            animation: confetti-fall 3s linear forwards;
            z-index: 1000;
        }
        
        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        .star-particle {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 1000;
            animation: star-fly 1s ease-out forwards;
        }
        
        @keyframes star-fly {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-100px); opacity: 0; }
        }
        
        /* 烟花 */
        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }
        
        .firework-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: firework-explode 1s ease-out forwards;
        }
        
        @keyframes firework-explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        /* 结束画面 */
        .result-card {
            background: linear-gradient(135deg, var(--cream) 0%, white 100%);
            border-radius: 40px;
            padding: 40px;
            max-width: 450px;
            margin: 30px auto;
            border: 5px solid var(--wood);
            text-align: center;
        }
        
        .result-emoji {
            font-size: 5rem;
            margin: 20px 0;
        }
        
        .result-title {
            font-size: 2rem;
            color: var(--forest);
            margin-bottom: 15px;
        }
        
        .result-stats {
            font-size: 1.2rem;
            color: #666;
            margin: 15px 0;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .game-title { font-size: 1.8rem; }
            .problem-equation { font-size: 2rem; }
            .problem-num { padding: 10px 15px; min-width: 60px; font-size: 1.8rem; }
            /* P1-1: Mobile block size >=50px */
            .block { width: 50px; height: 50px; font-size: 1rem; }
            .answer-input { width: 120px; height: 60px; font-size: 2rem; }
            .btn { padding: 15px 35px; font-size: 1.2rem; }
            .character { min-width: 140px; padding: 15px; }
            .character-emoji { font-size: 3rem; }
        }

        
        /* P1-5: All cleared special screen */
        .all-cleared-banner {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF6B6B, #9B59B6, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow-shift 2s linear infinite;
            margin: 15px 0;
        }
        
        @keyframes rainbow-shift {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
.error-feedback {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #FFCDD2 0%, #EF9A9A 100%);
            border-radius: 20px;
            margin: 15px auto;
            max-width: 450px;
            border: 3px solid var(--error);
            display: none;
        }
        .error-feedback.show { display: block; animation: pop-in 0.4s ease-out; }
        .error-feedback .error-icon { font-size: 3rem; margin-bottom: 10px; }
        .error-feedback .error-message { font-size: 1.3rem; color: var(--error); font-weight: bold; margin-bottom: 10px; }
        .error-feedback .error-hint { font-size: 1rem; color: #666; font-style: italic; }
        .speed-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; margin: 10px 0; animation: pop-in 0.4s ease-out; }
        .speed-badge.lightning { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #8B4513; }
        .speed-badge.great { background: linear-gradient(135deg, #90EE90 0%, #32CD32 100%); color: #006400; }
        .speed-badge.good { background: linear-gradient(135deg, #87CEEB 0%, #4682B4 100%); color: white; }
        .speed-badge.slow { background: linear-gradient(135deg, #DDA0DD 0%, #9370DB 100%); color: white; }
        .step-sub { font-size: 1rem; color: #666; margin-top: 5px; }
        .step.why { background: linear-gradient(135deg, #FFF9C4 0%, #FFF59D 100%); border-left-color: #FFC107; }
        .step.summary { background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%); border-left-color: #2196F3; }
        .step.info-step { background: linear-gradient(135deg, #F3E5F5 0%, #E1BEE7 100%); border-left-color: #9C27B0; }
        .block.highlight { background: linear-gradient(135deg, #90EE90 0%, #32CD32 100%); border-color: #228B22; animation: block-highlight 0.6s ease; }
        @keyframes block-highlight { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .block.subtract-target { background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%); border-color: #DC143C; }
        .character-desc { font-size: 0.75rem; color: #888; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>
    <!-- 森林背景 -->
    <div class="forest-bg" id="forestBg"></div>
    
    <!-- 奶酪屋顶装饰 -->
    <div class="cheese-roof">🧀</div>
    
    <div class="game-container">
        <!-- 开始界面 -->
        <div class="screen active" id="startScreen">
            <div class="header">
                <h1 class="game-title">🐭 小老鼠奶酪屋 🧀</h1>
            </div>
            
            <div class="result-card">
                <div style="font-size: 5rem;">🐭</div>
                <h2 style="color: var(--forest); font-size: 1.8rem; margin: 15px 0;">欢迎来到奶酪屋！</h2>
                <p style="color: #666; font-size: 1.1rem; line-height: 1.8;">
                    跟大毛和小毛一起<br>学习有趣的减法技巧吧！
                </p>
                
                <div style="margin: 25px 0;">
                    <div style="color: var(--forest); font-weight: bold; margin-bottom: 10px;">🐭 你的动物朋友们</div>
                    <div class="animal-friends" id="animalFriends"></div>
                    <!-- P1-2: Animal unlock hint -->
                    <div class="animal-unlock-hint">🌟 每通关3关解锁一个新朋友！</div>
                </div>
                
                <div style="margin: 20px 0;">
                    <div style="color: var(--forest); font-weight: bold; margin-bottom: 10px;">🧀 奶酪碎片</div>
                    <div class="collection" id="cheeseCollection"></div>
                </div>
                
                <button class="btn btn-primary" style="font-size: 1.5rem;" onclick="showLevelSelect()">
                    🎮 开始冒险
                </button>
                
                <div style="margin-top: 20px;">
                    <button class="btn btn-secondary" onclick="showAchievements()">🏆 成就墙</button>
                </div>
            </div>
        </div>
        
        <!-- 关卡选择 -->
        <div class="screen" id="levelScreen">
            <div class="header">
                <h1 class="game-title">选择关卡</h1>
            </div>
            
            <div style="text-align: center; margin: 20px 0;">
                <div class="collection" id="cheeseProgress"></div>
            </div>
            
            <div class="level-grid" id="levelGrid"></div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn btn-secondary" onclick="showStart()">← 返回</button>
            </div>
        </div>
        
        <!-- 成就墙 -->
        <div class="screen" id="achievementScreen">
            <div class="header">
                <h1 class="game-title">🏆 成就墙</h1>
            </div>
            
            <div class="achievements" id="achievementGrid"></div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn btn-secondary" onclick="showStart()">← 返回</button>
            </div>
        </div>
        
        <!-- 游戏界面 -->
        <div class="screen" id="gameScreen">
            <div class="header">
                <h1 class="game-title" id="levelTitle">第 1 关</h1>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">
                    <span class="progress-text" id="progressText">1/5</span>
                </div>
            </div>
            
            <div class="level-info">
                <div class="level-badge" id="methodBadge">📦 拆大数法</div>
                <div class="level-badge" id="starBadge">⭐⭐⭐</div>
            </div>
            
            <!-- 角色选择 -->
            <div class="character-area">
                <div class="character unlocked" id="charBig" onclick="selectCharacter('big')">
                    <span class="character-emoji">🐭</span>
                    <div class="character-name">大毛</div>
                    <div class="character-method">📦 凑整法</div>
                    <div class="character-desc">被减数个位比较小时用</div>
                    <div class="character-tooltip">个位不够减？先拆成整十再减~</div>
                    <div class="lock-overlay">🔒</div>
                </div>
                <div class="character locked" id="charSmall" onclick="selectCharacter('small')">
                    <span class="character-emoji">🐭</span>
                    <div class="character-name">小毛</div>
                    <div class="character-method">🎯 分段法</div>
                    <div class="character-desc">减数个位比较大时用</div>
                    <div class="character-tooltip">减数太大？拆成两段更简单~</div>
                    <div class="lock-overlay">🔒</div>

            </div>
            
            <!-- 题目卡片 -->
            <div class="problem-card">
                <div class="problem-equation">
                    <span class="problem-num" id="num1">24</span>
                    <span class="problem-op">−</span>
                    <span class="problem-num" id="num2">6</span>
                    <span class="problem-equals">=</span>
                    <span class="problem-num problem-answer" id="answerBox">?</span>
                </div>
            </div>
            
            <!-- 方块可视化 -->
            <div class="blocks-area" id="blocksArea">
                <div class="blocks-row" id="tensBlocks"></div>
                <div class="blocks-row" id="onesBlocks"></div>
                <div class="blocks-label" id="blocksLabel">点击角色查看解题步骤</div>
            </div>
            
            
            <!-- P0-1: Prominent hint bar -->
            <div class="hint-bar" id="hintBar">
                <span class="hint-arrow">👆</span>
                <span class="hint-text">先点击上方的大毛或小毛，看解题方法！</span>
            </div>
            
            <!-- 步骤展示 -->
            <div class="steps-area" id="stepsArea"></div>
            
            <!-- 输入区 -->
            <div class="input-area">
                <input type="number" class="answer-input" id="answerInput" placeholder="?" min="0" max="99">
                <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>回答</button>
            </div>
            
            <!-- 反馈 -->
            <div class="feedback" id="feedback"></div>
            <div class="error-feedback" id="errorFeedback"></div>
            
            <!-- 操作按钮 -->
            <div class="input-area" style="margin-top: 20px;">
                <button class="btn btn-secondary" id="nextBtn" onclick="nextQuestion()" style="display: none;">下一题 →</button>

            </div>
        </div>
        
        <!-- 关卡结束 -->
        <div class="screen" id="endScreen">
            <div class="result-card">
                <div class="result-emoji" id="resultEmoji">🎉</div>
                <h2 class="result-title" id="resultTitle">太棒了！</h2>
                <div class="stars-display" id="resultStars">⭐⭐⭐</div>
                <div class="result-stats" id="resultStats">
                    <p>答对: <strong>5/5</strong> 题</p>
                    <p>获得: <strong>+3</strong> 奶酪碎片</p>
                </div>
                <button class="btn btn-primary" id="resultNextBtn" onclick="nextLevel()">下一关 →</button>
                <button class="btn btn-secondary" onclick="backToLevels()" style="margin-top: 15px;">返回关卡</button>
            </div>
        </div>
    </div>
    
    <script>
        // ====== P0: 错误诊断系统 ======
        const ERROR_FEEDBACK = {
            borrow_tens_forgot: { icon: '🤔', message: '差一点！借了1之后，十位要少1哦~', hint: '再数数十位方块是不是少了一个？' },
            borrow_direction_wrong: { icon: '🔄', message: '方向反啦！应该从高位借，不是向低位借~', hint: '想象十位是哥哥，个位是弟弟，哥哥要帮助弟弟' },
            subtraction_error: { icon: '🔢', message: '个位算错了，再数一遍方块吧~', hint: '个位方块减去减数个位，还剩几个？' },
            tens_error: { icon: '🔟', message: '十位算错了，仔细看看~', hint: '十位方块减去减数十位，还剩几个？' },
            random_error: { icon: '💡', message: '再想想看~', hint: '可以再看一遍解题步骤哦' }
        };

        const SPEED_FEEDBACK = {
            lightning: { badge: '⚡ 闪电速度！', class: 'lightning' },
            great: { badge: '🎉 太棒了！', class: 'great' },
            good: { badge: '👍 不错哦~', class: 'good' },
            slow: { badge: '💪 可以再快一点哦', class: 'slow' }
        };

        let state = {
            currentLevel: 1, currentQuestion: 0, totalQuestions: 5, correctCount: 0,
            selectedCharacter: null, isShowingSteps: false, progress: {}, cheeseCount: 0,
            unlockedAnimals: [], achievements: [], levelStars: {}, questionStartTime: null,
            speedCount: 0, levelNoMistakes: true
        };

        const CONFIG = {
            questionsPerLevel: 5, starsPerCorrect: 3, cheesePerStar: 1,
            achievements: [
                { id: 'first_win', name: '初次通关', icon: '🌟', desc: '完成第一个关卡' },
                { id: 'perfect_3', name: '满分达人', icon: '💯', desc: '一关获得3星' },
                { id: 'cheese_5', name: '奶酪收集者', icon: '🧀', desc: '收集5个奶酪碎片' },
                { id: 'cheese_20', name: '奶酪富翁', icon: '💰', desc: '收集20个奶酪碎片' },
                { id: 'big_method', name: '大毛的朋友', icon: '📦', desc: '使用拆大数法通关' },
                { id: 'small_method', name: '小毛的朋友', icon: '🎯', desc: '使用拆小数法通关' },
                { id: 'animal_3', name: '动物管理员', icon: '🦊', desc: '解锁3个动物朋友' },
                { id: 'level_10', name: '数学小达人', icon: '🏆', desc: '通关所有关卡' },
                { id: 'speed_demon', name: '闪电侠', icon: '⚡', desc: '3次闪电速度答题' },
                { id: 'no_mistakes', name: '零失误', icon: '🎯', desc: '一关全对' }
            ],
            levels: [
                { id: 1, method: 'big', range: [11, 25], name: '拆大数入门1' },
                { id: 2, method: 'big', range: [20, 30], name: '拆大数入门2' },
                { id: 3, method: 'big', range: [31, 45], name: '拆大数熟练1' },
                { id: 4, method: 'big', range: [35, 50], name: '拆大数熟练2' },
                { id: 5, method: 'small', range: [15, 30], name: '拆小数入门1' },
                { id: 6, method: 'small', range: [20, 35], name: '拆小数入门2' },
                { id: 7, method: 'mixed', range: [20, 40], name: '综合练习1' },
                { id: 8, method: 'mixed', range: [25, 50], name: '综合练习2' },
                { id: 9, method: 'mixed', range: [30, 55], name: '综合练习3' },
                { id: 10, method: 'mixed', range: [35, 60], name: '终极挑战' }
            ],
            animals: ['🦊', '🐰', '🐻', '🦁', '🐼', '🐨', '🦉', '🐸']
        };

        function init() { loadProgress(); initForest(); updateCollection(); updateAnimalFriends(); updateAchievements(); }

        function initForest() {
            const bg = document.getElementById('forestBg');
            bg.innerHTML = '';
            for (let i = 0; i < 5; i++) { const cloud = document.createElement('div'); cloud.className = 'cloud'; cloud.textContent = '☁️'; cloud.style.left = (i * 25) + '%'; cloud.style.top = (5 + Math.random() * 15) + '%'; cloud.style.animationDelay = (i * 4) + 's'; cloud.style.fontSize = (30 + Math.random() * 20) + 'px'; bg.appendChild(cloud); }
            for (let i = 0; i < 8; i++) { const tree = document.createElement('div'); tree.className = 'tree'; tree.textContent = ['🌲', '🌳', '🌴'][Math.floor(Math.random() * 3)]; tree.style.left = (i * 13 + Math.random() * 5) + '%'; tree.style.fontSize = (40 + Math.random() * 30) + 'px'; bg.appendChild(tree); }
        }

        function loadProgress() {
            const saved = localStorage.getItem('mouseCheeseHouse');
            if (saved) { const data = JSON.parse(saved); state.progress = data.progress || {}; state.cheeseCount = data.cheeseCount || 0; state.unlockedAnimals = data.unlockedAnimals || []; state.achievements = data.achievements || []; state.levelStars = data.levelStars || {}; state.speedCount = data.speedCount || 0; }
        }

        function saveProgress() { localStorage.setItem('mouseCheeseHouse', JSON.stringify({ progress: state.progress, cheeseCount: state.cheeseCount, unlockedAnimals: state.unlockedAnimals, achievements: state.achievements, levelStars: state.levelStars, speedCount: state.speedCount })); }

        function updateCollection() {
            const container = document.getElementById('cheeseCollection'); const progress = document.getElementById('cheeseProgress');
            if (!container) return;
            let html = ''; for (let i = 0; i < 30; i++) { html += '<span class="cheese-fragment ' + (i < state.cheeseCount ? 'collected' : '') + '">🧀</span>'; }
            container.innerHTML = html;
            if (progress) { let progressHtml = ''; const maxShow = 10; for (let i = 0; i < maxShow; i++) { progressHtml += '<span class="cheese-fragment ' + (i < Math.min(state.cheeseCount, maxShow) ? 'collected' : '') + '">🧀</span>'; } if (state.cheeseCount > maxShow) progressHtml += '<span style="font-size:1.2rem;">+' + (state.cheeseCount - maxShow) + '</span>'; progress.innerHTML = progressHtml; }
        }

        function updateAnimalFriends() { const container = document.getElementById('animalFriends'); if (!container) return; container.innerHTML = CONFIG.animals.map((animal, i) => '<span class="animal ' + (state.unlockedAnimals.includes(i) ? 'unlocked' : '') + '">' + animal + '</span>').join(''); }

        function updateAchievements() { const grid = document.getElementById('achievementGrid'); if (!grid) return; grid.innerHTML = CONFIG.achievements.map(a => '<div class="achievement ' + (state.achievements.includes(a.id) ? 'unlocked' : '') + '"><span class="achievement-icon">' + (state.achievements.includes(a.id) ? a.icon : '🔒') + '</span><span class="achievement-name">' + a.name + '</span></div>').join(''); }

        function unlockAchievement(id) { if (!state.achievements.includes(id)) { state.achievements.push(id); saveProgress(); updateAchievements(); showAchievementNotification(id); } }

        function showAchievementNotification(id) { const achievement = CONFIG.achievements.find(a => a.id === id); if (!achievement) return; const notification = document.createElement('div'); notification.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FFD93D 0%,#F4C430 100%);padding:20px 40px;border-radius:20px;border:4px solid #8B4513;font-size:1.2rem;font-weight:bold;color:#8B4513;z-index:10000;animation:pop-in 0.5s ease;'; notification.innerHTML = '🏆 解锁成就：' + achievement.icon + ' ' + achievement.name; document.body.appendChild(notification); setTimeout(() => notification.remove(), 3000); }

        function showScreen(screenId) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(screenId).classList.add('active'); }
        function showStart() { showScreen('startScreen'); updateCollection(); updateAnimalFriends(); }
        function showLevelSelect() { renderLevelGrid(); showScreen('levelScreen'); }
        function showAchievements() { updateAchievements(); showScreen('achievementScreen'); }
        function backToLevels() { showLevelSelect(); }

        function renderLevelGrid() {
            const grid = document.getElementById('levelGrid'); let html = '';
            CONFIG.levels.forEach((level, i) => {
                const isUnlocked = i === 0 || state.progress[i]; const isCompleted = state.progress[level.id]; const stars = state.levelStars[level.id] || 0; const isCurrent = level.id === state.currentLevel;
                html += '<button class="level-btn ' + (isCompleted ? 'completed' : '') + ' ' + (isCurrent ? 'current' : '') + ' ' + (!isUnlocked ? 'locked' : '') + '"' + (!isUnlocked ? 'disabled' : 'onclick="startLevel(' + level.id + ')"') + '>' + level.id + (isCompleted ? '<div class="level-stars">' + '⭐'.repeat(stars) + '☆'.repeat(3-stars) + '</div>' : '') + '</button>';
            });
            grid.innerHTML = html; updateCollection();
        }

        function startLevel(levelId) {
            state.currentLevel = levelId; state.currentQuestion = 0; state.correctCount = 0; state.selectedCharacter = null; state.levelNoMistakes = true;
            const level = CONFIG.levels.find(l => l.id === levelId); document.getElementById('levelTitle').textContent = '第 ' + level.id + ' 关：' + level.name;
            const charBig = document.getElementById('charBig'); const charSmall = document.getElementById('charSmall');
            if (level.method === 'big' || level.method === 'mixed') { charBig.classList.remove('locked'); charBig.classList.add('unlocked'); charBig.querySelector('.lock-overlay').style.display = 'none'; }
            if (level.method === 'small' || level.method === 'mixed') { charSmall.classList.remove('locked'); charSmall.classList.add('unlocked'); charSmall.querySelector('.lock-overlay').style.display = 'none'; }
            showScreen('gameScreen'); generateQuestion();
        }

        function generateQuestion() {
            const level = CONFIG.levels.find(l => l.id === state.currentLevel); const [min, max] = level.range; let num1, num2;
            do { num1 = Math.floor(Math.random() * (max - min + 1)) + min; num2 = Math.floor(Math.random() * (num1 * 0.6)) + 5; } while (num1 <= num2 || num2 < 3 || num1 > 99 || num2 > 99);
            if (level.method === 'big') { num1 = Math.floor(num1 / 10) * 10 + Math.floor(Math.random() * 6) + 5; } else if (level.method === 'small') { num2 = Math.floor(Math.random() * 5) + 5; num1 = Math.floor(Math.random() * (max - min + 1)) + min; if (num1 <= num2) num1 = num2 + Math.floor(Math.random() * 10) + 10; }
            state.num1 = num1; state.num2 = num2; state.answer = num1 - num2; state.questionStartTime = Date.now();
            document.getElementById('num1').textContent = num1; document.getElementById('num2').textContent = num2; document.getElementById('answerBox').textContent = '?'; document.getElementById('answerBox').className = 'problem-num problem-answer';
            const progress = (state.currentQuestion / state.totalQuestions) * 100; document.getElementById('progressFill').style.width = progress + '%'; document.getElementById('progressText').textContent = (state.currentQuestion + 1) + '/' + state.totalQuestions;
            document.getElementById('answerInput').value = ''; document.getElementById('answerInput').disabled = false; document.getElementById('submitBtn').disabled = true; document.getElementById('nextBtn').style.display = 'none'; document.getElementById('feedback').className = 'feedback'; document.getElementById('errorFeedback').className = 'error-feedback'; document.getElementById('stepsArea').innerHTML = '';
            state.selectedCharacter = null; state.isShowingSteps = false; document.querySelectorAll('.character').forEach(c => c.classList.remove('selected'));
            renderBlocks();
            const methodBadge = document.getElementById('methodBadge'); if (level.method === 'big') methodBadge.textContent = '📦 凑整法'; else if (level.method === 'small') methodBadge.textContent = '🎯 分段法'; else methodBadge.textContent = '🔄 混合练习';
            document.getElementById('blocksLabel').textContent = '点击角色查看解题步骤';
// P0-1: Auto-select 大毛 and show steps by default
            setTimeout(function() {
                var bigChar = document.getElementById('charBig');
                if (bigChar && (bigChar.classList.contains('unlocked')) && !bigChar.classList.contains('locked')) {
                    selectCharacter('big');
                }
            }, 300);
        }

        function renderBlocks() {
            const tensRow = document.getElementById('tensBlocks'); const onesRow = document.getElementById('onesBlocks'); const tens = Math.floor(state.num1 / 10); const ones = state.num1 % 10;
            let html = ''; for (let i = 0; i < tens; i++) { html += '<div class="block tens show-num" data-value="' + (i + 1) + '" data-type="tens"><span class="block-num">' + ((i + 1) * 10) + '</span></div>'; }
            tensRow.innerHTML = html || '<span style="color:#666;">无十位</span>';
            html = ''; for (let i = 0; i < ones; i++) { html += '<div class="block show-num" data-value="' + (i + 1) + '" data-type="ones"><span class="block-num">' + (i + 1) + '</span></div>'; }
            onesRow.innerHTML = html || '<span style="color:#666;">无个位</span>';
        }

        function selectCharacter(type) { const charEl = document.getElementById(type === 'big' ? 'charBig' : 'charSmall'); if (charEl.classList.contains('locked')) return; state.selectedCharacter = type; document.querySelectorAll('.character').forEach(c => c.classList.remove('selected')); charEl.classList.add('selected'); hideHintBar(); showSteps(type); }

        // ====== P0: 错误诊断核心函数 ======
        function diagnoseError(userAnswer, correctAnswer, num1, num2) {
            const userTens = Math.floor(userAnswer / 10); const userOnes = userAnswer % 10; const correctTens = Math.floor(correctAnswer / 10); const correctOnes = correctAnswer % 10;
            const n1Tens = Math.floor(num1 / 10); const n1Ones = num1 % 10; const n2Tens = Math.floor(num2 / 10); const n2Ones = num2 % 10; const needsBorrow = n1Ones < n2Ones;
            if (needsBorrow) { const correctTensAfterBorrow = n1Tens - 1 - n2Tens; if (userTens === n1Tens - n2Tens && userTens === correctTens + 1) { return 'borrow_tens_forgot'; } if (userTens === n1Tens + n2Tens + 1 || (n1Ones >= n2Ones && userTens === n1Tens + n2Tens)) { return 'borrow_direction_wrong'; } }
            if (userOnes !== correctOnes) { if (userTens === correctTens) { return 'subtraction_error'; } if (needsBorrow) { return 'borrow_tens_forgot'; } return 'subtraction_error'; }
            if (userTens !== correctTens) { return 'tens_error'; }
            return 'random_error';
        }

        function showErrorDiagnosis(errorType) { const feedback = ERROR_FEEDBACK[errorType]; const errorEl = document.getElementById('errorFeedback'); errorEl.innerHTML = '<div class="error-icon">' + feedback.icon + '</div><div class="error-message">' + feedback.message + '</div><div class="error-hint">' + feedback.hint + '</div>'; errorEl.classList.add('show'); }

        function getSpeedFeedback(timeMs) { const seconds = timeMs / 1000; if (seconds < 15) return SPEED_FEEDBACK.lightning; if (seconds < 30) return SPEED_FEEDBACK.great; if (seconds < 60) return SPEED_FEEDBACK.good; return SPEED_FEEDBACK.slow; }

        function showSpeedBadge(speed) { const badge = document.createElement('div'); badge.className = 'speed-badge ' + speed.class; badge.textContent = speed.badge; const feedback = document.getElementById('feedback'); feedback.parentNode.insertBefore(badge, feedback.nextSibling); setTimeout(() => { if (badge.parentNode) badge.remove(); }, 3000); }

        function highlightOnesBlocks() { const onesBlocks = document.getElementById('onesBlocks'); onesBlocks.querySelectorAll('.block').forEach(b => { b.classList.add('highlight'); setTimeout(() => b.classList.remove('highlight'), 600); }); }

        function subtractOnesBlocks(count) { const onesBlocks = document.getElementById('onesBlocks'); const blocks = onesBlocks.querySelectorAll('.block'); blocks.forEach((b, i) => { if (i >= blocks.length - count) { b.classList.add('subtract-target'); } }); setTimeout(() => { blocks.forEach((b, i) => { if (i >= blocks.length - count) { b.classList.add('used'); b.classList.remove('subtract-target', 'highlight'); } }); }, 400); }


        function hideHintBar() {
            var hint = document.getElementById('hintBar');
            if (hint) { hint.style.display = 'none'; }
        }

        function showSteps(type) {
            state.isShowingSteps = true; const stepsArea = document.getElementById('stepsArea'); const blocksLabel = document.getElementById('blocksLabel'); const n1 = state.num1; const n2 = state.num2; let steps = []; let blocksLabelText = '';
            if (type === 'big') {
                blocksLabelText = '📦 凑整法演示'; const tens = Math.floor(n1 / 10) * 10; const ones = n1 % 10; const needsBorrow = ones < (n2 % 10);
                steps.push({ icon: '💡', text: '为什么可以这样算？', sub: '把被减数拆成整十加个位，它们合起来还是原数，所以答案不变！原理：' + n1 + ' = ' + tens + ' + ' + ones, type: 'why' });
                steps.push({ icon: '📝', text: '什么时候用拆大数法？', sub: '当被减数的个位(' + ones + ')比减数的个位(' + (n2%10) + ')小时，用这个方法~', type: 'info' });
                if (needsBorrow) { const borrow = 10; const newOnes = ones + borrow; const newTens = tens - borrow; steps.push({ icon: '📦', text: '把 <span class="step-highlight">' + n1 + '</span> 拆成 <span class="step-result">' + newTens + ' + ' + newOnes + '</span>', sub: '(从十位借1当10)', type: 'normal', highlightOnes: true }); steps.push({ icon: '🔢', text: '先用 <span class="step-result">' + newOnes + '</span> 减去 <span class="step-highlight">' + (n2 % 10) + '</span>', sub: newOnes + ' - ' + (n2 % 10) + ' = ' + (newOnes - (n2 % 10)), type: 'normal', subtractOnes: true }); steps.push({ icon: '🔢', text: '再算 <span class="step-result">' + newTens + '</span> 减去 <span class="step-highlight">' + (Math.floor(n2 / 10) * 10) + '</span>', sub: newTens + ' - ' + (Math.floor(n2 / 10) * 10) + ' = ' + (newTens - Math.floor(n2 / 10) * 10), type: 'normal' }); steps.push({ icon: '✨', text: '最后相加: <span class="step-result">' + (newTens - Math.floor(n2 / 10) * 10) + ' + ' + (newOnes - (n2 % 10)) + ' = ' + state.answer + '</span>', sub: '🎉 答案!', type: 'result' }); }
                else { steps.push({ icon: '📦', text: '把 <span class="step-highlight">' + n1 + '</span> 拆成 <span class="step-result">' + tens + ' + ' + ones + '</span>', sub: '', type: 'normal' }); steps.push({ icon: '🔢', text: '先用 <span class="step-result">' + tens + '</span> 减去 <span class="step-highlight">' + (Math.floor(n2 / 10) * 10 || 0) + '</span>', sub: tens > 0 ? tens + ' - ' + (Math.floor(n2 / 10) * 10 || 0) + ' = ' + (tens - Math.floor(n2 / 10) * 10) : '= 0', type: 'normal' }); steps.push({ icon: '🔢', text: '再减去 <span class="step-highlight">' + (n2 % 10) + '</span>', sub: ones + ' - ' + (n2 % 10) + ' = ' + (ones - (n2 % 10)), type: 'normal' }); steps.push({ icon: '✨', text: '答案: <span class="step-result">' + state.answer + '</span>', sub: '🎉', type: 'result' }); }
            } else {
                blocksLabelText = '🎯 分段法演示'; const toTen = 10 - (n2 % 10); const remain = n2 % 10;
                steps.push({ icon: '💡', text: '为什么可以这样算？', sub: '把减数拆成两部分，先凑成整十再减，这样算更简单！原理：把' + n2 + '变成' + toTen + '+' + remain, type: 'why' });
                steps.push({ icon: '📝', text: '什么时候用拆小数法？', sub: '当减数的个位(' + (n2%10) + ')比较大时，先凑成整十再减，更快！', type: 'info' });
                steps.push({ icon: '🎯', text: '把 <span class="step-highlight">' + n2 + '</span> 拆成 <span class="step-result">' + toTen + ' + ' + remain + '</span>', sub: '(凑成整十)', type: 'normal' }); steps.push({ icon: '🔢', text: '先用 <span class="step-result">' + n1 + '</span> 减去 <span class="step-highlight">' + toTen + '</span>', sub: n1 + ' - ' + toTen + ' = ' + (n1 - toTen), type: 'normal' }); steps.push({ icon: '🔢', text: '再减去 <span class="step-highlight">' + remain + '</span>', sub: (n1 - toTen) + ' - ' + remain + ' = ' + state.answer, type: 'normal' }); steps.push({ icon: '✨', text: '答案: <span class="step-result">' + state.answer + '</span>', sub: '🎉', type: 'result' });
            }
            steps.push({ icon: '📋', text: '这道题用' + (type === 'big' ? '凑整法' : '分段法') + '更简单！', sub: type === 'big' ? '因为' + n1 + '的个位(' + (n1%10) + ')比' + n2 + '的个位(' + (n2%10) + ')小~' : '因为' + n2 + '的个位(' + (n2%10) + ')比较大，拆成' + toTen + '+' + remain + '凑整十~', type: 'summary' });
            blocksLabel.textContent = blocksLabelText;
            stepsArea.innerHTML = steps.map((s, i) => { const typeClass = s.type === 'why' ? 'why' : (s.type === 'summary' ? 'summary' : (s.type === 'info' ? 'info-step' : '')); const borderColor = type === 'big' ? '#FF6B6B' : '#4ECDC4'; return '<div class="step ' + typeClass + '" style="border-left-color:' + borderColor + '" data-step="' + i + '"><span class="step-icon">' + s.icon + '</span><span class="step-text">' + s.text + '<br><span class="step-sub">' + s.sub + '</span></span></div>'; }).join('');
            setTimeout(() => { stepsArea.querySelectorAll('.step').forEach((step, i) => { setTimeout(() => { step.classList.add('visible'); const stepData = steps[i]; if (stepData.highlightOnes) highlightOnesBlocks(); if (stepData.subtractOnes) subtractOnesBlocks(state.num2 % 10); }, i * 500); }); }, 100);
            setTimeout(() => { document.getElementById('submitBtn').disabled = false; document.getElementById('answerInput').focus(); }, steps.length * 500 + 300);
        }

        function submitAnswer() {
            const input = document.getElementById('answerInput'); const answer = parseInt(input.value); const answerBox = document.getElementById('answerBox'); const feedback = document.getElementById('feedback'); const errorFeedback = document.getElementById('errorFeedback');
            if (isNaN(answer)) { feedback.textContent = '请输入答案哦~'; feedback.className = 'feedback show wrong'; return; }
            const timeMs = Date.now() - state.questionStartTime; const speed = getSpeedFeedback(timeMs);
            input.disabled = true; document.getElementById('submitBtn').disabled = true;
            if (answer === state.answer) {
                state.correctCount++; answerBox.textContent = answer; answerBox.classList.add('correct');
                const messages = ['太棒了！🎉', '真聪明！⭐', '完全正确！✨', '厉害！👏', '答对啦！🌟']; feedback.textContent = messages[Math.floor(Math.random() * messages.length)]; feedback.className = 'feedback show correct';
                showSpeedBadge(speed);
                if (speed === SPEED_FEEDBACK.lightning) { state.speedCount++; if (state.speedCount >= 3) unlockAchievement('speed_demon'); }
                createConfetti(); createStarBurst(); unlockAchievement('first_win'); if (state.selectedCharacter === 'big') unlockAchievement('big_method'); if (state.selectedCharacter === 'small') unlockAchievement('small_method');
            } else {
                state.levelNoMistakes = false; answerBox.textContent = answer; answerBox.classList.add('wrong');
                const errorType = diagnoseError(answer, state.answer, state.num1, state.num2); showErrorDiagnosis(errorType);
                const cheese = document.querySelector('.cheese-roof'); cheese.style.animation = 'shake-card 0.5s ease'; setTimeout(() => cheese.style.animation = '', 500);
            }
            document.getElementById('starBadge').textContent = '⭐'.repeat(state.correctCount) + '☆'.repeat(state.totalQuestions - state.correctCount); document.getElementById('nextBtn').style.display = 'inline-block'; if (state.currentQuestion >= state.totalQuestions - 1) { document.getElementById('nextBtn').textContent = '查看结果 🎉'; }
        }

        function nextQuestion() { state.currentQuestion++; if (state.currentQuestion >= state.totalQuestions) { showLevelEnd(); return; } document.getElementById('nextBtn').textContent = '下一题 →'; generateQuestion(); }

        
        function showAnimalUnlockPopup(animal) {
            var popup = document.createElement('div');
            popup.className = 'animal-unlock-popup';
            popup.innerHTML = '<span class="popup-emoji">' + animal + '</span><div class="popup-title">🦊 新朋友来啦！</div><div class="popup-desc">又解锁了一个动物朋友~</div>';
            document.body.appendChild(popup);
            createConfetti();
            setTimeout(function() { if (popup.parentNode) popup.remove(); }, 2500);
        }

        function showLevelEnd() {
            const stars = Math.ceil((state.correctCount / state.totalQuestions) * CONFIG.starsPerCorrect); const cheeseEarned = stars;
            state.progress[state.currentLevel] = true; if (!state.levelStars[state.currentLevel] || state.levelStars[state.currentLevel] < stars) { state.levelStars[state.currentLevel] = stars; }
            state.cheeseCount += cheeseEarned; if (state.unlockedAnimals.length < CONFIG.animals.length && state.currentLevel % 3 === 0) { const newAnimal = state.unlockedAnimals.length; state.unlockedAnimals.push(newAnimal); }
            if (state.levelNoMistakes && state.correctCount === state.totalQuestions) { unlockAchievement('no_mistakes'); }
            if (stars === 3) unlockAchievement('perfect_3'); if (state.cheeseCount >= 5) unlockAchievement('cheese_5'); if (state.cheeseCount >= 20) unlockAchievement('cheese_20'); if (state.unlockedAnimals.length >= 3) unlockAchievement('animal_3'); if (state.currentLevel === 10) unlockAchievement('level_10');
            saveProgress();
            document.getElementById('resultEmoji').textContent = stars >= 2 ? '🎉' : '💪'; document.getElementById('resultTitle').textContent = stars === 3 ? '完美通关！' : stars >= 2 ? '做得很棒！' : '继续加油！'; document.getElementById('resultStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars); document.getElementById('resultStats').innerHTML = '<p>答对: <strong>' + state.correctCount + '/' + state.totalQuestions + '</strong> 题</p><p>获得: <strong>+' + cheeseEarned + '</strong> 奶酪碎片</p>';
            showScreen('endScreen'); createFireworks();
        }

        function nextLevel() { if (state.currentLevel < 10) { state.currentLevel++; startLevel(state.currentLevel); } else { showStart(); } }

        function createConfetti() { const colors = ['#FFD93D', '#6BCB77', '#FF6B6B', '#4ECDC4', '#9B59B6', '#FF8C00']; for (let i = 0; i < 50; i++) { const confetti = document.createElement('div'); confetti.className = 'confetti'; confetti.style.left = Math.random() * 100 + '%'; confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)]; confetti.style.animationDelay = Math.random() * 0.5 + 's'; confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px'; document.body.appendChild(confetti); setTimeout(() => confetti.remove(), 3000); } }

        function createStarBurst() { for (let i = 0; i < 8; i++) { const star = document.createElement('div'); star.className = 'star-particle'; star.textContent = ['⭐', '🌟', '✨'][Math.floor(Math.random() * 3)]; star.style.left = (30 + Math.random() * 40) + '%'; star.style.top = (30 + Math.random() * 20) + '%'; document.body.appendChild(star); setTimeout(() => star.remove(), 1000); } }

        function createFireworks() { const colors = ['#FFD93D', '#FF6B6B', '#6BCB77', '#4ECDC4', '#9B59B6']; for (let firework = 0; firework < 3; firework++) { setTimeout(() => { const fw = document.createElement('div'); fw.className = 'firework'; fw.style.left = (20 + Math.random() * 60) + '%'; fw.style.top = (20 + Math.random() * 30) + '%'; for (let i = 0; i < 12; i++) { const particle = document.createElement('div'); particle.className = 'firework-particle'; particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)]; const angle = (i / 12) * Math.PI * 2; const distance = 50 + Math.random() * 50; particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px'); particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px'); fw.appendChild(particle); } document.body.appendChild(fw); setTimeout(() => fw.remove(), 1000); }, firework * 300); } }

        document.getElementById('answerInput').addEventListener('keypress', function(e) { if (e.key === 'Enter' && !document.getElementById('submitBtn').disabled) { submitAnswer(); } });

        init();

</script>
</body>
</html>
